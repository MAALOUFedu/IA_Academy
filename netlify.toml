# =============================================================================
# Netlify Configuration — ML Academy (Formation IA Machine Learning)
# =============================================================================
# Base de données Turso (SQLite compatible + cloud)
# 
# SETUP TURSO:
#   1. Installez Turso CLI: https://docs.turso.tech/
#   2. Créez un compte: turso auth signup
#   3. Créez la base: turso db create ml-academy
#   4. Obtenez l'URL: turso db show ml-academy --url
#   5. Créez un token: turso db tokens create ml-academy
#   6. Configurez dans Netlify Dashboard:
#      - Site settings > Build & deploy > Environment
#      - DATABASE_URL = "libsql://ml-academy-[user].turso.io"
#      - DATABASE_AUTH_TOKEN = "[votre-token]"
# =============================================================================

# Variables d'environnement requises
# [context.production.environment]
#   DATABASE_URL = "libsql://ml-academy-[user].turso.io"
#   DATABASE_AUTH_TOKEN = "[token]"
#   CONTACT_EMAIL = "imadmaalouf02@gmail.com"
#   ADMIN_PASSWORD = "[votre-mot-de-passe]"
#   NEXT_PUBLIC_APP_URL = "https://your-site.netlify.app"
# =============================================================================

[build]
  command = "npx prisma generate && npx prisma db push --skip-generate && npx prisma db seed && npx next build"
  publish = ".next"

# Plugin Next.js de Netlify (support SSR + API Routes)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirection pour la langue française
[[redirects]]
  from = "/en/*"
  to = "/"
  status = 301


